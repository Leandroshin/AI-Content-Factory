<body>
<div id="appLayout" class="app-layout">
  <!-- Sidebar -->

      <button class="sidebar-btn" data-view="experiments" onclick="App.navigate('experiments')"><span class="sidebar-icon">🔬</span><span class="sidebar-text">Experimentos</span></button>
      <button class="sidebar-btn" data-view="patterns" onclick="App.navigate('patterns')"><span class="sidebar-icon">📈</span><span class="sidebar-text">Padroes de Mercado</span></button>
      <button class="sidebar-btn" data-view="tools" onclick="App.navigate('tools')"><span class="sidebar-icon">🛠️</span><span class="sidebar-text">Ferramentas</span></button>
      <button class="sidebar-btn" data-view="software" onclick="App.navigate('software')"><span class="sidebar-icon">💡</span><span class="sidebar-text">Oportunidades</span></button>

      <button class="sidebar-btn" data-view="capital" onclick="App.navigate('capital')"><span class="sidebar-icon">💰</span><span class="sidebar-text">Alocacao de Capital</span></button>
      <button class="sidebar-btn" data-view="history" onclick="App.navigate('history')"><span class="sidebar-icon">📜</span><span class="sidebar-text">Historico</span></button>
      <button class="sidebar-btn" data-view="settings" onclick="App.navigate('settings')"><span class="sidebar-icon">⚙️</span><span class="sidebar-text">Configuracoes</span></button>

      <div class="top-bar-actions">
        <button class="btn btn-sm btn-ghost explain-this-btn" id="explainThisBtn" onclick="App.startTour()" title="Tour guiado por esta tela">Explicar esta tela</button>
        <span class="top-bar-mode" id="topBarMode" onclick="App.toggleMode()" title="Clique para alternar modo">Entender</span>
        <span class="top-bar-mock">MOCK</span>

<!-- Mobile drawer overlay -->
<div id="drawerOverlay" class="drawer-overlay hidden" onclick="App.closeDrawer()"></div>

<!-- Modal - MARKET-INTELLIGENCE-MODALFIX-3 -->

     class="modal-overlay"
     hidden
     aria-hidden="true"

       class="modal"
       role="dialog"
       aria-modal="true"
       aria-labelledby="app-modal-title"
