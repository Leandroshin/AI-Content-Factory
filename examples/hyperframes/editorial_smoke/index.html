<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Fase Nova Games - HyperFrames smoke</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body { background: #090b10; color: #f7f8fa; font-family: Arial, sans-serif; }
    .stage { position: relative; overflow: hidden; background: #090b10; }
    .scene { position: absolute; inset: 0; overflow: hidden; }
    .backdrop {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #090b10 0%, #182638 55%, #166534 100%);
    }
    .eyebrow { position: absolute; left: 72px; top: 130px; color: #5ee58d; font-size: 30px; font-weight: 700; }
    h1 { position: absolute; left: 72px; right: 72px; top: 210px; margin: 0; font-size: 88px; line-height: 0.96; }
    .source { position: absolute; left: 72px; bottom: 116px; font-size: 25px; color: #c8d0dc; }
    .badge { position: absolute; right: 72px; bottom: 96px; padding: 18px 24px; background: #f7f8fa; color: #090b10; font-size: 23px; font-weight: 700; }
  </style>
</head>
<body>
  <main id="stage" class="stage clip" data-composition-id="fase-nova-editorial-smoke" data-start="0" data-width="1080" data-height="1920" data-duration="2" data-fps="30">
    <section id="scene-intro" class="scene clip" data-start="0" data-duration="2" data-track-index="0">
      <div class="backdrop"></div>
      <div class="eyebrow">FASE NOVA GAMES</div>
      <h1>Noticias de jogos, sem enrolacao.</h1>
      <div class="source">Fonte oficial + contexto + revisao humana</div>
      <div class="badge">SHORT 9:16</div>
    </section>
  </main>
  <script>
    const timeline = gsap.timeline({ paused: true });
    timeline.from(".eyebrow", { opacity: 0, y: 28, duration: 0.35, ease: "power3.out" }, 0.1);
    timeline.from("h1", { opacity: 0, y: 44, duration: 0.5, ease: "power3.out" }, 0.22);
    timeline.from(".source", { opacity: 0, y: 20, duration: 0.35, ease: "power2.out" }, 0.55);
    timeline.from(".badge", { opacity: 0, scale: 0.88, duration: 0.3, ease: "back.out(1.5)" }, 0.75);
    timeline.to(".backdrop", { scale: 1.03, duration: 1.9, ease: "none" }, 0);
    window.__timelines = window.__timelines || {};
    window.__timelines["fase-nova-editorial-smoke"] = timeline;
  </script>
</body>
</html>
